filebeat.inputs:
  - type: log
    enabled: true
    paths:
      - /app/**/logs/*.log
    json.keys_under_root: true
    json.add_error_key: true
    json.ignore_decoding_error: true

output.elasticsearch:
  hosts: ["http://elasticsearch:9200"]
  index: "app-logs-%{+yyyy.MM.dd}"

setup.kibana:
  host: "kibana:5601"